    function collectSkuRemarks() { let inputs=document.querySelectorAll('#skuRemarksContainer .sku-remark-text'); let arr=[]; inputs.forEach(inp=>{ if(inp.value.trim()) arr.push({text:inp.value.trim(), timestamp:new Date().toLocaleString()}); }); return arr; }
    function renderSkuRemarks(remarks) { let container=document.getElementById("skuRemarksContainer"); container.innerHTML=''; remarks.forEach((r,idx)=>{ let div=document.createElement('div'); div.style.display='flex'; div.style.gap='8px'; div.style.marginBottom='6px'; div.innerHTML=`<input type="text" value="${escapeHtml(r.text)}" class="sku-remark-text" style="flex:1;"><button type="button" class="btn-icon remove-sku-remark" data-idx="${idx}"><i class="fas fa-trash"></i></button>`; container.appendChild(div); }); container.querySelectorAll('.remove-sku-remark').forEach(btn=>{ btn.addEventListener('click',(e)=>{ let idx=parseInt(btn.getAttribute('data-idx')); let newRemarks=collectSkuRemarks(); newRemarks.splice(idx,1); renderSkuRemarks(newRemarks); }); }); }
    function saveSkuLogic() { let groupId = parseInt(document.getElementById("skuGroupSelect").value); let productNameRaw = document.getElementById("productName").value.trim(); if(!productNameRaw) { alert("商品名称不能为空"); return false; } let skuCode = document.getElementById("skuCode").value.trim(); if(!skuCode) { alert("SKU不能为空"); return false; } let imageUrl = document.getElementById("skuImage").value; let bare = parseFloat(document.getElementById("skuBare").value) || 0; let freight = parseFloat(document.getElementById("skuFreight").value) || 0; let other = parseFloat(document.getElementById("skuOther").value) || 0; let remarks = collectSkuRemarks(); let product = productNames.find(pn => pn.groupId === groupId && pn.name === productNameRaw); if(!product) { product = { id: generateId(), groupId: groupId, name: productNameRaw, history: [] }; productNames.push(product); addProductHistory(product.id, "创建商品", `创建商品 ${productNameRaw}`); } let skuId = document.getElementById("skuId").value; if(skuId) { let idx = skus.findIndex(s => s.id == skuId); if(idx !== -1) { let oldSku = skus[idx]; let changes = []; if(oldSku.sku !== skuCode) changes.push(`SKU: ${oldSku.sku} → ${skuCode}`); if(oldSku.bareCost !== bare) changes.push(`裸成本: ${oldSku.bareCost} → ${bare}`); if(oldSku.freightCost !== freight) changes.push(`运费: ${oldSku.freightCost} → ${freight}`); if(oldSku.otherCost !== other) changes.push(`其他: ${oldSku.otherCost} → ${other}`); let detail = changes.length ? `修改了 ${changes.join(', ')}` : "更新了信息"; addSkuHistory(parseInt(skuId), "编辑SKU", detail); skus[idx] = { ...oldSku, productNameId: product.id, sku: skuCode, imageUrl, bareCost: bare, freightCost: freight, otherCost: other, remarks, updatedAt: new Date().toLocaleString() }; } } else { let newId = generateId(); let newSku = { id: newId, productNameId: product.id, sku: skuCode, imageUrl, bareCost: bare, freightCost: freight, otherCost: other, remarks, history: [], createdAt: new Date().toLocaleString(), updatedAt: new Date().toLocaleString() }; skus.push(newSku); addSkuHistory(newId, "创建SKU", `创建了SKU ${skuCode}`); } saveAll(); renderAll(); document.getElementById("skuModal").style.display = "none"; return true; }
    function createNewGroupAndSelect(selectId) { let newName=prompt("新分类名称"); if(newName&&newName.trim()){ let newId=generateId(); groups.push({id:newId, name:newName.trim()}); saveAll(); let select=document.getElementById(selectId); select.innerHTML=groups.map(g=>`<option value="${g.id}">${escapeHtml(g.name)}</option>`).join(''); select.value=newId; renderAll(); } }
    
    // ================== 利润计算器全新多选实现 ==================
    let profitTreeState = { groups: new Map() };
    
    function renderProfitTree() {
        const container = document.getElementById("profitProductTree");
        if(!container) return;
        let html = '';
        for(let group of groups) {
            let groupCollapsed = profitTreeState.groups.get(group.id) || false;
            let productsInGroup = productNames.filter(pn => pn.groupId === group.id);
            let hasProducts = false;
            let groupContentHtml = '';
            for(let product of productsInGroup) {
                let skuList = skus.filter(s => s.productNameId === product.id);
                let pkgList = packages.filter(p => p.productNameId === product.id);
                if(skuList.length === 0 && pkgList.length === 0) continue;
                hasProducts = true;
                let productCollapsed = profitTreeState.groups.get(`product_${product.id}`) || false;
                let itemsHtml = '';
                // 单品
                for(let sku of skuList) {
                    let total = computeSkuTotal(sku);
                    let checked = profitSelectedMap.has(`sku_${sku.id}`) ? 'checked' : '';
                    itemsHtml += `<div class="profit-item-row">
                        <input type="checkbox" class="profit-item-checkbox" data-type="sku" data-id="${sku.id}" data-cost="${total}" data-name="${escapeHtml(sku.sku)}" ${checked}>
                        <div class="profit-item-info"><strong>${escapeHtml(sku.sku)}</strong> <span class="badge">单品</span></div>
                        <div class="profit-item-cost">成本 ¥${total.toFixed(2)}</div>
                    </div>`;
                }
                // 套餐
                for(let pkg of pkgList) {
                    let total = computePackageTotal(pkg);
                    let checked = profitSelectedMap.has(`pkg_${pkg.id}`) ? 'checked' : '';
                    itemsHtml += `<div class="profit-item-row">
                        <input type="checkbox" class="profit-item-checkbox" data-type="pkg" data-id="${pkg.id}" data-cost="${total}" data-name="${escapeHtml(pkg.name)}" ${checked}>
                        <div class="profit-item-info"><strong>${escapeHtml(pkg.name)}</strong> <span class="badge">套餐</span></div>
                        <div class="profit-item-cost">成本 ¥${total.toFixed(2)}</div>
                    </div>`;
                }
                groupContentHtml += `
                    <div class="profit-tree-product">
                        <div class="profit-tree-product-header ${productCollapsed ? 'collapsed' : ''}" data-product-id="${product.id}">
                            <i class="fas fa-chevron-right"></i> ${escapeHtml(product.name)}
                        </div>
                        <div class="profit-tree-items ${productCollapsed ? 'collapsed' : ''}" data-product-items="${product.id}">
                            ${itemsHtml}
                        </div>
                    </div>
                `;
            }
            if(!hasProducts) continue;
            html += `
                <div class="profit-tree-group">
                    <div class="profit-tree-group-header ${groupCollapsed ? 'collapsed' : ''}" data-group-id="${group.id}">
                        <i class="fas fa-folder-open"></i> ${escapeHtml(group.name)}
                    </div>
                    <div class="profit-tree-group-content ${groupCollapsed ? 'collapsed' : ''}" data-group-content="${group.id}">
                        ${groupContentHtml}
                    </div>
                </div>
            `;
        }
        if(html === '') html = '<div class="badge" style="padding:20px; text-align:center;">暂无任何产品，请先创建单品或套餐</div>';
        container.innerHTML = html;
        // 绑定折叠事件
        document.querySelectorAll('.profit-tree-group-header').forEach(header => {
            header.removeEventListener('click', profitGroupToggle);
            header.addEventListener('click', profitGroupToggle);
        });
        document.querySelectorAll('.profit-tree-product-header').forEach(header => {
            header.removeEventListener('click', profitProductToggle);
            header.addEventListener('click', profitProductToggle);
        });
        // 绑定checkbox事件
        document.querySelectorAll('.profit-item-checkbox').forEach(cb => {
            cb.removeEventListener('change', profitCheckboxChange);
            cb.addEventListener('change', profitCheckboxChange);
        });
    }
    function profitGroupToggle(e) {
        e.stopPropagation();
        const header = e.currentTarget;
        const groupId = parseInt(header.getAttribute('data-group-id'));
        const content = document.querySelector(`.profit-tree-group-content[data-group-content="${groupId}"]`);
        if(content) {
            const isCollapsed = content.classList.contains('collapsed');
            if(isCollapsed) {
                content.classList.remove('collapsed');
                header.classList.remove('collapsed');
                profitTreeState.groups.set(groupId, false);
            } else {
                content.classList.add('collapsed');
                header.classList.add('collapsed');
                profitTreeState.groups.set(groupId, true);
            }
        }
    }
    function profitProductToggle(e) {
        e.stopPropagation();
        const header = e.currentTarget;
        const productId = parseInt(header.getAttribute('data-product-id'));
        const itemsDiv = document.querySelector(`.profit-tree-items[data-product-items="${productId}"]`);
        if(itemsDiv) {
            const isCollapsed = itemsDiv.classList.contains('collapsed');
            if(isCollapsed) {
                itemsDiv.classList.remove('collapsed');
                header.classList.remove('collapsed');
                profitTreeState.groups.set(`product_${productId}`, false);
            } else {
                itemsDiv.classList.add('collapsed');
                header.classList.add('collapsed');
                profitTreeState.groups.set(`product_${productId}`, true);
            }
        }
    }
    function profitCheckboxChange(e) {
        const cb = e.target;
        const type = cb.getAttribute('data-type');
        const id = parseInt(cb.getAttribute('data-id'));
        const cost = parseFloat(cb.getAttribute('data-cost'));
        const name = cb.getAttribute('data-name');
        const key = `${type}_${id}`;
        if(cb.checked) {
            if(!profitSelectedMap.has(key)) {
                profitSelectedMap.set(key, { id, type, name, cost });
            }
        } else {
            profitSelectedMap.delete(key);
        }
        updateProfitSelectedListUI();
        recalcProfit();
    }
    function updateProfitSelectedListUI() {
        const container = document.getElementById("profitSelectedList");
        if(!container) return;
        const totalCost = Array.from(profitSelectedMap.values()).reduce((sum, item) => sum + item.cost, 0);
        document.getElementById("selectedCountProfit").innerText = profitSelectedMap.size;
        document.getElementById("productBaseCost").value = totalCost.toFixed(2);
        if(profitSelectedMap.size === 0) {
            container.innerHTML = '<div class="badge">暂无选中商品</div>';
            return;
        }
        let html = '';
        for(let [key, item] of profitSelectedMap.entries()) {
            html += `<div class="selected-item">
                <span>${escapeHtml(item.name)} (${item.type === 'sku' ? '单品' : '套餐'}) 成本: ¥${item.cost.toFixed(2)}</span>
                <button class="remove-selected-item" data-key="${key}"><i class="fas fa-times-circle"></i></button>
            </div>`;
        }
        container.innerHTML = html;
        container.querySelectorAll('.remove-selected-item').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const key = btn.getAttribute('data-key');
                if(key && profitSelectedMap.has(key)) {
                    profitSelectedMap.delete(key);
                    // 同步树上的checkbox状态
                    const [type, id] = key.split('_');
                    const cb = document.querySelector(`.profit-item-checkbox[data-type="${type}"][data-id="${id}"]`);
                    if(cb) cb.checked = false;
                    updateProfitSelectedListUI();
                    recalcProfit();
                }
            });
        });
    }
    function clearAllProfitSelections() {
        profitSelectedMap.clear();
        // 取消所有checkbox
        document.querySelectorAll('.profit-item-checkbox').forEach(cb => cb.checked = false);
        updateProfitSelectedListUI();
        recalcProfit();
    }
    function loadProfitSettings() {
        let saved = localStorage.getItem(STORAGE_PROFIT_SETTINGS);
        if(saved) {
            let settings = JSON.parse(saved);
            if(settings.shipping !== undefined) document.getElementById("profitShipping").value = settings.shipping;
            if(settings.packing !== undefined) document.getElementById("profitPacking").value = settings.packing;
            if(settings.other !== undefined) document.getElementById("profitOtherFee").value = settings.other;
        } else {
            document.getElementById("profitShipping").value = 2.5;
            document.getElementById("profitPacking").value = 0.4;
            document.getElementById("profitOtherFee").value = 0;
        }
    }
    function saveProfitSettings() {
        let shipping = parseFloat(document.getElementById("profitShipping").value) || 0;
        let packing = parseFloat(document.getElementById("profitPacking").value) || 0;
        let other = parseFloat(document.getElementById("profitOtherFee").value) || 0;
        localStorage.setItem(STORAGE_PROFIT_SETTINGS, JSON.stringify({ shipping, packing, other }));
    }
    function recalcProfit() {
        let baseCost = parseFloat(document.getElementById("productBaseCost").value) || 0;
        let shipping = parseFloat(document.getElementById("profitShipping").value) || 0;
        let packing = parseFloat(document.getElementById("profitPacking").value) || 0;
        let other = parseFloat(document.getElementById("profitOtherFee").value) || 0;
        let sellingPrice = parseFloat(document.getElementById("profitSellingPrice").value) || 0;
        let totalCost = baseCost + shipping + packing + other;
        let profit = sellingPrice - totalCost;
        let margin = sellingPrice > 0 ? (profit / sellingPrice) * 100 : 0;
        document.getElementById("displayTotalCost").innerText = `¥${totalCost.toFixed(2)}`;
        let profitSpan = document.getElementById("displayProfit");
        profitSpan.innerText = `¥${profit.toFixed(2)}`;
        profitSpan.className = `profit-value ${profit >= 0 ? 'positive' : 'negative'}`;
        let marginSpan = document.getElementById("displayMargin");
        marginSpan.innerText = `${margin.toFixed(2)}%`;
        marginSpan.className = `profit-value ${margin >= 0 ? 'positive' : 'negative'}`;
    }
    function openProfitCalculator() {
        profitSelectedMap.clear();
        profitTreeState.groups.clear();
        renderProfitTree();
        loadProfitSettings();
        document.getElementById("productBaseCost").value = "";
        document.getElementById("profitSellingPrice").value = "0";
        recalcProfit();
        document.getElementById("profitModal").style.display = "flex";
    }
    function bindProfitEvents() {
        document.getElementById("profitCalculatorBtn").onclick = openProfitCalculator;
        document.getElementById("closeProfitModalBtn").onclick = () => document.getElementById("profitModal").style.display = "none";
        document.getElementById("cancelProfitModal").onclick = () => document.getElementById("profitModal").style.display = "none";
        document.getElementById("profitShipping").addEventListener("input", () => { saveProfitSettings(); recalcProfit(); });
        document.getElementById("profitPacking").addEventListener("input", () => { saveProfitSettings(); recalcProfit(); });
        document.getElementById("profitOtherFee").addEventListener("input", () => { saveProfitSettings(); recalcProfit(); });
        document.getElementById("profitSellingPrice").addEventListener("input", recalcProfit);
        document.getElementById("clearAllProfitBtn").addEventListener("click", clearAllProfitSelections);
    }
    
    function bindStaticEvents() {
        document.getElementById("addProductBtn").onclick = () => openSkuModal(null);
        document.getElementById("addPackageBtn").onclick = () => openPackageModal(null);
        document.getElementById("addGroupBtn").onclick = () => { let name=prompt("新分类名"); if(name){ groups.push({id:generateId(), name:name.trim()}); saveAll(); renderAll(); } };
        document.getElementById("batchModeBtn").onclick = () => { batchMode=true; document.getElementById("batchActionBar").style.display="flex"; renderAll(); };
        document.getElementById("exitBatchModeBtn").onclick = () => exitBatchMode();
        document.getElementById("selectAllBtn").onclick = selectAll;
        document.getElementById("deselectAllBtn").onclick = deselectAll;
        document.getElementById("batchCategoryBtn").onclick = () => { if(selectedItems.size===0){ alert("请先勾选商品"); return; } let modal=document.getElementById("batchCategoryModal"); let select=document.getElementById("batchCategorySelect"); select.innerHTML=groups.map(g=>`<option value="${g.id}">${escapeHtml(g.name)}</option>`).join(''); modal.style.display="flex"; };
        document.getElementById("batchDeleteBtn").onclick = batchDeleteToRecycle;
        document.getElementById("recycleBinBtn").onclick = () => showRecycleBin();
        document.getElementById("exportAllBtn").onclick = exportXLSX;
        document.getElementById("exportTable2Btn").onclick = exportAsTable2;
        document.getElementById("importBtn").onclick = () => document.getElementById("importFile").click();
        document.getElementById("importFile").onchange = (e) => { if(e.target.files.length) importXLSX(e.target.files[0]); e.target.value=''; };
        document.getElementById("clearAllBtn").onclick = clearAllWithPassword;
        document.getElementById("closeSkuModalBtn").onclick = () => document.getElementById("skuModal").style.display="none";
        document.getElementById("cancelSkuModal").onclick = () => document.getElementById("skuModal").style.display="none";
        document.getElementById("closePackageModalBtn").onclick = () => document.getElementById("packageModal").style.display="none";
        document.getElementById("cancelPackageModal").onclick = () => document.getElementById("packageModal").style.display="none";
        document.getElementById("closeHistoryModal").onclick = () => document.getElementById("historyModal").style.display="none";
        document.getElementById("closeLightbox").onclick = () => document.getElementById("lightbox").style.display="none";
        document.getElementById("lightbox").onclick = (e) => { if(e.target===document.getElementById("lightbox")) document.getElementById("lightbox").style.display="none"; };
        document.getElementById("closeBatchModal").onclick = () => document.getElementById("batchCategoryModal").style.display="none";
        document.getElementById("cancelBatchModal").onclick = () => document.getElementById("batchCategoryModal").style.display="none";
        document.getElementById("confirmBatchBtn").onclick = () => { let targetId=parseInt(document.getElementById("batchCategorySelect").value); batchSetCategory(targetId); document.getElementById("batchCategoryModal").style.display="none"; };
        document.getElementById("closeRecycleBinModal").onclick = () => document.getElementById("recycleBinModal").style.display="none";
        document.getElementById("restoreSelectedBtn").onclick = () => { const selected = Array.from(selectedItems); selected.forEach(key => { const [type, id] = key.split('_'); restoreFromRecycleBin(type, parseInt(id)); }); selectedItems.clear(); showRecycleBin(); };
        document.getElementById("deleteSelectedPermanentlyBtn").onclick = () => { if(confirm("彻底删除选中项？不可恢复！")) { const selected = Array.from(selectedItems); selected.forEach(key => { const [type, id] = key.split('_'); permanentDelete(type, parseInt(id)); }); selectedItems.clear(); showRecycleBin(); } };
        document.getElementById("emptyRecycleBinBtn").onclick = () => emptyRecycleBin();
        document.getElementById("skuForm").onsubmit = (e) => { e.preventDefault(); saveSkuLogic(); };
        document.getElementById("packageForm").onsubmit = (e) => { e.preventDefault(); savePackage(); };
        document.getElementById("addSkuRemarkBtn").onclick = () => { let remarks = collectSkuRemarks(); remarks.push({text:"", timestamp:new Date().toLocaleString()}); renderSkuRemarks(remarks); };
        document.getElementById("addPkgRemarkBtn").onclick = () => { let remarks = collectPkgRemarks(); remarks.push({text:"", timestamp:new Date().toLocaleString()}); renderPkgRemarks(remarks); };
        document.getElementById("newSkuGroupBtn").onclick = () => createNewGroupAndSelect("skuGroupSelect");
        document.getElementById("newPkgGroupBtn").onclick = () => createNewGroupAndSelect("pkgGroupSelect");
        document.getElementById("skuImage").addEventListener("input", (e) => previewImage(e.target.value, "skuImagePreview", "previewSkuImg"));
        document.getElementById("pkgImage").addEventListener("input", (e) => previewImage(e.target.value, "packageImagePreview", "previewPkgImg"));
        document.getElementById("skuBare").addEventListener("input", updateSkuTotal);
        document.getElementById("skuFreight").addEventListener("input", updateSkuTotal);
        document.getElementById("skuOther").addEventListener("input", updateSkuTotal);
        let productNameSelect = document.getElementById("productNameSelect");
        let groupSelect = document.getElementById("skuGroupSelect");
        function updateProductNameSelect() { let gid = parseInt(groupSelect.value); let relatedProducts = productNames.filter(pn => pn.groupId === gid); productNameSelect.innerHTML = '<option value="">-- 选择已有商品 --</option>' + relatedProducts.map(pn => `<option value="${escapeHtml(pn.name)}">${escapeHtml(pn.name)}</option>`).join(''); }
        groupSelect.onchange = updateProductNameSelect;
        productNameSelect.onchange = () => { if(productNameSelect.value) document.getElementById("productName").value = productNameSelect.value; };
        updateProductNameSelect();
        bindProfitEvents();
    }
    function openSkuModal(id=null) { document.getElementById("skuId").value = id||''; let groupSelect = document.getElementById("skuGroupSelect"); groupSelect.innerHTML = groups.map(g => `<option value="${g.id}">${escapeHtml(g.name)}</option>`).join(''); let productNameInput = document.getElementById("productName"); if(id) { let sku = skus.find(s => s.id === id); if(sku) { let product = productNames.find(pn => pn.id === sku.productNameId); groupSelect.value = product ? product.groupId : groups[0].id; productNameInput.value = product ? product.name : ""; document.getElementById("skuCode").value = sku.sku; document.getElementById("skuImage").value = sku.imageUrl || ''; document.getElementById("skuBare").value = sku.bareCost; document.getElementById("skuFreight").value = sku.freightCost; document.getElementById("skuOther").value = sku.otherCost; updateSkuTotal(); renderSkuRemarks(sku.remarks || []); previewImage(sku.imageUrl, "skuImagePreview", "previewSkuImg"); let currentGroupId = product ? product.groupId : groups[0].id; let relatedProducts = productNames.filter(pn => pn.groupId === currentGroupId); let productNameSelect = document.getElementById("productNameSelect"); productNameSelect.innerHTML = '<option value="">-- 选择已有商品 --</option>' + relatedProducts.map(pn => `<option value="${escapeHtml(pn.name)}">${escapeHtml(pn.name)}</option>`).join(''); productNameSelect.value = product ? product.name : ""; } } else { groupSelect.value = groups[0].id; productNameInput.value = ""; document.getElementById("skuCode").value = ""; document.getElementById("skuImage").value = ""; document.getElementById("skuBare").value = 0; document.getElementById("skuFreight").value = 0; document.getElementById("skuOther").value = 0; updateSkuTotal(); renderSkuRemarks([]); document.getElementById("skuImagePreview").style.display = "none"; let relatedProducts = productNames.filter(pn => pn.groupId === groups[0].id); let productNameSelect = document.getElementById("productNameSelect"); productNameSelect.innerHTML = '<option value="">-- 选择已有商品 --</option>' + relatedProducts.map(pn => `<option value="${escapeHtml(pn.name)}">${escapeHtml(pn.name)}</option>`).join(''); productNameSelect.value = ""; } document.getElementById("skuModal").style.display = "flex"; }
    loadData(); bindStaticEvents(); setupGlobalSearch(); initGlobalActionMenu(); renderAll();
})();
